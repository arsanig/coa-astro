name: Scheduled rebuild

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        id: trigger
        run: |
          RESPONSE=$(curl -s -X POST ${{ secrets.CF_DEPLOY_HOOK_URL }})
          echo "response=$RESPONSE"
          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.result.id')
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Wait for Cloudflare build to complete
        run: |
          DEPLOYMENT_ID="${{ steps.trigger.outputs.deployment_id }}"
          echo "Waiting for deployment: $DEPLOYMENT_ID"

          for i in $(seq 1 30); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ secrets.CF_PROJECT_NAME }}/deployments/$DEPLOYMENT_ID" \
              | jq -r '.result.latest_stage.status')

            echo "Attempt $i: status=$STATUS"

            if [ "$STATUS" = "success" ]; then
              echo "Build succeeded."
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "canceled" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi

            sleep 30
          done

          echo "Timed out waiting for build."
          exit 1

      - name: Cancel Cloudflare deployment
        if: cancelled()
        run: |
          DEPLOYMENT_ID="${{ steps.trigger.outputs.deployment_id }}"
          curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ secrets.CF_PROJECT_NAME }}/deployments/$DEPLOYMENT_ID"

      - name: Fetch Cloudflare build logs
        if: always()
        run: |
          DEPLOYMENT_ID="${{ steps.trigger.outputs.deployment_id }}"
          sleep 10
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/${{ secrets.CF_PROJECT_NAME }}/deployments/$DEPLOYMENT_ID/history/logs")

          CROPPED=$(echo "$RESPONSE" | jq -r '.result.includes_cropped_lines')
          TOTAL=$(echo "$RESPONSE" | jq -r '.result.total')
          echo "Total log lines: $TOTAL, Cropped: $CROPPED"

          echo "$RESPONSE" | jq -r '(.result.data // []) | .[] | "\(.ts) \(.line)"' > /tmp/cf-build-logs.txt
          echo "=== Cloudflare Build Logs ($(wc -l < /tmp/cf-build-logs.txt) lines) ==="
          cat /tmp/cf-build-logs.txt

          if [ "$CROPPED" = "true" ]; then
            echo "::warning::Build logs were truncated by Cloudflare"
          fi

          echo '### Cloudflare Build Logs' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/cf-build-logs.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-logs
          path: /tmp/cf-build-logs.txt
          retention-days: 7
